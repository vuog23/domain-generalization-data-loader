experiment:
  name: cpv_domainbed_style
  seed: 42
  device: auto
  num_workers: 2
  output_dir: domainbed_style/outputs
  log_dir: domainbed_style/logs

dataset:
  name: PACS
  builder: single_domain
  root_path: datasets/processed/PACS
  target_domain: photo
  source_domains: null
  target_domain_group: null
  source_domain_groups: null
  source_splits:
    - train
    - test
  target_splits:
    - train
    - test
  val_ratio: 0.2
  num_workers: 2

available_datasets:
  DomainNet:
    builder: multi_domain
    root_path: datasets/processed/DomainNet
    target_domain_group: clipart_infograph
    source_domain_groups: null
    source_splits: [train, test]
    target_splits: [train, test]
  NICOPP:
    builder: multi_domain
    root_path: datasets/processed/NICOPP
    target_domain_group: autumn_rock
    source_domain_groups: null
    source_splits: [train, test]
    target_splits: [train, test]
  OfficeHome:
    builder: single_domain
    root_path: datasets/processed/OfficeHome
    target_domain: Art
    source_domains: null
  PACS:
    builder: single_domain
    root_path: datasets/processed/PACS
    target_domain: photo
    source_domains: null
  TerraIncognita:
    builder: single_domain
    root_path: datasets/processed/TerraIncognita
    target_domain: L38
    source_domains: null
  VLCS:
    builder: split_domain
    root_path: datasets/processed/VLCS
    target_domain: PASCAL
    source_domains: null
    source_splits: [train]
    target_splits: [test]

training:
  mode: train
  algorithm: ERM
  arch: resnet50
  pretrain: Supervised
  linear_probe: false
  image_size: 224
  optimizer: Adam
  scheduler: None
  steps: 5000
  checkpoint_freq: 300
  log_freq: 20
  swad: false
  save_model_best: true
  save_model_every_checkpoint: false

hparams:
  common:
    batch_size: 32
    lr: 5.0e-5
    weight_decay: 0.0
    resnet_dropout: 0.0
    nonlinear_classifier: false
    class_balanced: false
    pretrained_weights_dir: null
    momentum: 0.95
    step_size_ratio: 0.5
    decay_ratio: 0.1
    n_converge: 3
    n_tolerance: 6
    tolerance_ratio: 0.3
    n_steps_bn: 500
  algorithms:
    ERM: {}
    CORAL:
      mmd_gamma: 1.0
    MMD:
      mmd_gamma: 1.0
    IRM:
      irm_lambda: 100.0
      irm_penalty_anneal_iters: 500
    VREx:
      vrex_lambda: 10.0
      vrex_penalty_anneal_iters: 500
    GroupDRO:
      groupdro_eta: 1.0e-2
    Mixup:
      mixup_alpha: 0.2
    Fish:
      meta_lr: 0.5
    MLDG:
      mldg_beta: 1.0
      n_meta_test: 2
    SagNet:
      sag_w_adv: 0.1
    RSC:
      rsc_f_drop_factor: 0.3333333333
      rsc_b_drop_factor: 0.3333333333
    SD:
      sd_reg: 0.1
    ANDMask:
      tau: 1.0
    SANDMask:
      tau: 1.0
      k: 10.0
    IGA:
      penalty: 1000.0
    Fishr:
      lambda: 1000.0
      penalty_anneal_iters: 1500
      ema: 0.95
    TRM:
      cos_lambda: 1.0e-4
      iters: 200
      groupdro_eta: 1.0e-2
    IB_ERM:
      ib_lambda: 100.0
      ib_penalty_anneal_iters: 500
    IB_IRM:
      irm_lambda: 100.0
      irm_penalty_anneal_iters: 500
      ib_lambda: 100.0
      ib_penalty_anneal_iters: 500
    DANN:
      lambda: 1.0
      lr_g: 5.0e-5
      lr_d: 5.0e-5
      weight_decay_g: 0.0
      weight_decay_d: 0.0
      d_steps_per_g_step: 1
      grad_penalty: 0.0
      beta1: 0.5
      mlp_width: 256
      mlp_depth: 3
      mlp_dropout: 0.0
    CDANN:
      lambda: 1.0
      lr_g: 5.0e-5
      lr_d: 5.0e-5
      weight_decay_g: 0.0
      weight_decay_d: 0.0
      d_steps_per_g_step: 1
      grad_penalty: 0.0
      beta1: 0.5
      mlp_width: 256
      mlp_depth: 3
      mlp_dropout: 0.0
    SelfReg: {}
    SMA: {}

bayesian_tuning:
  enabled: false
  study_name: cpv_domainbed_tpe
  storage: null
  direction: maximize
  sampler: tpe
  startup_trials: 5
  multivariate: true
  pruner: none
  n_trials: 20
  trial_steps: 1500
  refit_best: false
  refit_steps: null
  save_trial_models: false
  seed: 42
  search_space:
    batch_size:
      type: categorical
      choices: [16, 32]
    lr:
      type: log_float
      low: 1.0e-5
      high: 3.0e-4
    weight_decay:
      type: log_float
      low: 1.0e-6
      high: 1.0e-2
    resnet_dropout:
      type: categorical
      choices: [0.0, 0.1, 0.5]

algorithm_search_spaces:
  ERM:
    lr:
      type: log_float
      low: 1.0e-5
      high: 3.0e-4
    weight_decay:
      type: log_float
      low: 1.0e-6
      high: 1.0e-2
  CORAL:
    mmd_gamma:
      type: log_float
      low: 1.0e-1
      high: 1.0e1
  MMD:
    mmd_gamma:
      type: log_float
      low: 1.0e-1
      high: 1.0e1
  IRM:
    irm_lambda:
      type: log_float
      low: 1.0e-5
      high: 1.0e-1
    irm_penalty_anneal_iters:
      type: int
      low: 1
      high: 10000
  GroupDRO:
    groupdro_eta:
      type: log_float
      low: 1.0e-3
      high: 1.0e-1
  Mixup:
    mixup_alpha:
      type: log_float
      low: 1.0e-1
      high: 1.0e1
  Fish:
    meta_lr:
      type: categorical
      choices: [0.05, 0.1, 0.5]
  SagNet:
    sag_w_adv:
      type: log_float
      low: 1.0e-2
      high: 1.0e1
  RSC:
    rsc_f_drop_factor:
      type: float
      low: 0.0
      high: 0.5
    rsc_b_drop_factor:
      type: float
      low: 0.0
      high: 0.5
  Fishr:
    lambda:
      type: log_float
      low: 1.0e1
      high: 1.0e4
    penalty_anneal_iters:
      type: int
      low: 1
      high: 5000
    ema:
      type: float
      low: 0.9
      high: 0.99

algorithms:
  supported:
    - ERM
    - Fish
    - IRM
    - GroupDRO
    - Mixup
    - MLDG
    - CORAL
    - MMD
    - DANN
    - CDANN
    - MTL
    - SagNet
    - ARM
    - VREx
    - RSC
    - SD
    - ANDMask
    - SANDMask
    - IGA
    - SelfReg
    - Fishr
    - TRM
    - IB_ERM
    - IB_IRM
    - SMA
